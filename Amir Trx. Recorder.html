<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transaction Entry</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-grad-1: #e2e8f0; --bg-grad-2: #bbf7d0; --bg-grad-3: #cbd5e1; --bg-grad-4: #86efac; 
            --card-bg: rgba(255, 255, 255, 0.85); --text-main: #1e293b; --text-muted: #475569;
            --border-color: rgba(203, 213, 225, 0.8); --input-bg: rgba(255, 255, 255, 0.9);
            --card-shadow: 0 8px 32px 0 rgba(30, 41, 59, 0.15);
            --select-arrow: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%23475569%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E");
        }
        [data-theme="dark"] {
            --bg-grad-1: #334155; --bg-grad-2: #166534; --bg-grad-3: #1e293b; --bg-grad-4: #14532d; 
            --card-bg: rgba(30, 41, 59, 0.85); --text-main: #f8fafc; --text-muted: #cbd5e1;
            --border-color: rgba(71, 85, 105, 0.6); --input-bg: rgba(15, 23, 42, 0.7);
            --card-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
            --select-arrow: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%23cbd5e1%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E");
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; color: var(--text-main); display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 30px 20px; transition: color 0.5s ease; background: linear-gradient(-45deg, var(--bg-grad-1), var(--bg-grad-2), var(--bg-grad-3), var(--bg-grad-4)); background-size: 400% 400%; animation: gradientBG 15s ease infinite; }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        
        .top-bar { display: flex; width: 100%; max-width: 420px; justify-content: space-between; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
        .icon-btn { padding: 8px 14px; border-radius: 30px; border: 1px solid var(--border-color); background: var(--card-bg); color: var(--text-main); backdrop-filter: blur(10px); cursor: pointer; font-weight: 600; font-size: 0.85rem; transition: all 0.3s; box-shadow: 0 4px 6px rgba(0,0,0,0.1); display: flex; align-items: center; justify-content: center; gap: 6px; flex: 1; min-width: max-content; }
        .icon-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 12px rgba(0,0,0,0.15); }

        .calculator-card { position: relative; background: var(--card-bg); backdrop-filter: blur(16px); width: 100%; max-width: 420px; border-radius: 20px; border: 1px solid var(--border-color); box-shadow: var(--card-shadow); padding: 32px 28px; animation: slideUpFade 0.6s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes slideUpFade { 0% { opacity: 0; transform: translateY(40px); } 100% { opacity: 1; transform: translateY(0); } }
        .header { text-align: center; margin-bottom: 28px; }
        .header h2 { font-size: 1.5rem; font-weight: 700; letter-spacing: -0.5px; }
        .form-group { margin-bottom: 20px; display: flex; flex-direction: column; }
        .form-group label { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 8px; font-weight: 600; text-transform: uppercase; }
        .form-control { width: 100%; padding: 12px 16px; border: 2px solid var(--border-color); border-radius: 12px; font-size: 1rem; font-weight: 500; font-family: inherit; background: var(--input-bg); color: var(--text-main); transition: all 0.3s ease; }
        .form-control:hover { border-color: #10b981; }
        .form-control:focus { outline: none; border-color: #10b981; background: var(--card-bg); box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.15); }
        select.form-control { appearance: none; background-image: var(--select-arrow); background-repeat: no-repeat; background-position: right 1rem top 50%; background-size: 0.8rem auto; padding-right: 2.5rem; cursor: pointer; }
        select.form-control option { background-color: var(--card-bg); color: var(--text-main); font-weight: 500; }
        .type-toggle { display: flex; gap: 12px; margin-bottom: 24px; }
        .type-toggle label { flex: 1; cursor: pointer; }
        .type-toggle input[type="radio"] { display: none; }
        .type-box { display: block; text-align: center; padding: 14px; border: 2px solid var(--border-color); border-radius: 12px; font-weight: 700; color: var(--text-muted); background: var(--input-bg); transition: all 0.3s; }
        #type-received:checked + .type-box { border-color: #10b981; background-color: rgba(16, 185, 129, 0.1); color: #10b981; }
        #type-spent:checked + .type-box { border-color: #ef4444; background-color: rgba(239, 68, 68, 0.1); color: #ef4444; }
        .btn-group { display: flex; gap: 10px; margin-top: 32px; }
        .btn { flex: 1; padding: 16px; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; color: white; font-size: 1.05rem; transition: all 0.3s; display: flex; align-items: center; justify-content: center; gap: 10px; box-shadow: 0 4px 15px rgba(16, 185, 129, 0.4); }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 6px 20px rgba(16, 185, 129, 0.6); }
        .btn:active { transform: scale(0.96); }
        .btn-save { background: linear-gradient(135deg, #10b981, #059669); }
        .btn-save:disabled { cursor: not-allowed; opacity: 0.8; transform: none; box-shadow: none; }
        .loader { width: 20px; height: 20px; border: 3px solid #fff; border-bottom-color: transparent; border-radius: 50%; display: inline-block; animation: rotation 1s linear infinite; }
        @keyframes rotation { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .emoji-overlay { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.1); font-size: 10rem; opacity: 0; pointer-events: none; z-index: 9999; filter: drop-shadow(0 10px 20px rgba(0,0,0,0.3)); }
        .emoji-overlay.show { animation: popAndFade 2s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes popAndFade { 0% { opacity: 0; transform: translate(-50%, -50%) scale(0.1); } 15% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); } 30% { opacity: 0.9; transform: translate(-50%, -50%) scale(1); } 70% { opacity: 0.8; transform: translate(-50%, -60%) scale(1.1); } 100% { opacity: 0; transform: translate(-50%, -100%) scale(0.5); } }

        /* Modal Styles */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: none; justify-content: center; align-items: center; z-index: 1000; backdrop-filter: blur(4px); }
        .modal-overlay.active { display: flex; animation: fadeInModal 0.3s ease forwards; }
        @keyframes fadeInModal { from { opacity: 0; } to { opacity: 1; } }
        
        .modal { background: var(--card-bg); width: 90%; max-width: 400px; border-radius: 16px; padding: 24px; box-shadow: var(--card-shadow); max-height: 80vh; overflow-y: auto; border: 1px solid var(--border-color); }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .modal-header h3 { font-size: 1.2rem; margin: 0; color: var(--text-main); }
        .close-btn { background: none; border: none; font-size: 1.5rem; cursor: pointer; color: var(--text-muted); transition: color 0.2s; }
        .close-btn:hover { color: #ef4444; }
        
        .list-section { margin-bottom: 24px; }
        .list-section h4 { margin-bottom: 10px; font-size: 0.85rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
        .add-row { display: flex; gap: 8px; margin-bottom: 12px; }
        .add-row input { flex: 1; padding: 10px 12px; border: 1px solid var(--border-color); border-radius: 8px; background: var(--input-bg); color: var(--text-main); font-family: inherit; }
        .add-row input:focus { outline: none; border-color: #3b82f6; }
        .add-row button { padding: 8px 16px; background: #3b82f6; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; transition: background 0.2s; }
        .add-row button:hover { background: #2563eb; }
        
        .manage-list { list-style: none; padding: 0; margin: 0; }
        .manage-list li { display: flex; justify-content: space-between; padding: 10px 14px; background: var(--input-bg); border: 1px solid var(--border-color); margin-bottom: 6px; border-radius: 8px; font-size: 0.95rem; align-items: center; color: var(--text-main); }
        .manage-list li button { color: #ef4444; background: none; border: none; cursor: pointer; font-size: 1.2rem; font-weight: bold; transition: transform 0.2s; }
        .manage-list li button:hover { transform: scale(1.2); }

        /* Smart Voice Entry */
        .btn-dictate { width: 100%; padding: 14px; margin-bottom: 24px; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; color: white; font-size: 1rem; background: linear-gradient(135deg, #8b5cf6, #6366f1); box-shadow: 0 4px 15px rgba(139,92,246,0.4); transition: all 0.3s; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-dictate:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(139,92,246,0.6); }
        .btn-dictate:disabled { cursor: not-allowed; opacity: 0.8; transform: none; }
        .mic-circle { width: 90px; height: 90px; border-radius: 50%; border: none; background: linear-gradient(135deg, #8b5cf6, #6366f1); color: white; font-size: 2.2rem; cursor: pointer; box-shadow: 0 6px 20px rgba(139,92,246,0.45); transition: transform 0.2s; }
        .mic-circle:hover { transform: scale(1.05); }
        .mic-circle.listening { animation: pulse 1.2s infinite; background: linear-gradient(135deg, #ef4444, #dc2626); }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(239,68,68,0.6); } 70% { box-shadow: 0 0 0 18px rgba(239,68,68,0); } 100% { box-shadow: 0 0 0 0 rgba(239,68,68,0); } }
        .dictation-status { font-size: 0.85rem; color: var(--text-muted); margin-top: 12px; line-height: 1.4; }
        .transcript-box { width: 100%; min-height: 80px; padding: 12px 16px; border: 2px solid var(--border-color); border-radius: 12px; font-size: 1rem; font-family: inherit; background: var(--input-bg); color: var(--text-main); resize: vertical; transition: all 0.3s; }
        .transcript-box:focus { outline: none; border-color: #8b5cf6; box-shadow: 0 0 0 4px rgba(139,92,246,0.15); }
        .preview-actions { display: flex; gap: 10px; margin-top: 24px; }
        .btn-secondary { flex: 1; padding: 16px; border: 2px solid var(--border-color); border-radius: 12px; font-weight: 700; cursor: pointer; background: var(--input-bg); color: var(--text-main); font-size: 1.05rem; transition: all 0.3s; }
        .btn-secondary:hover { border-color: #8b5cf6; }
    </style>
</head>
<body>

<div class="top-bar">
    <button class="icon-btn" onclick="toggleTheme()" id="theme-btn">🌙 Dark Mode</button>
    <button class="icon-btn" onclick="toggleFullScreen()" id="fs-btn">⛶ Fullscreen</button>
    <button class="icon-btn" onclick="openModal()" title="Manage Categories & Sources">⚙️ Settings</button>
</div>

<div class="calculator-card">
    <div class="header"><h2>New Transaction</h2></div>

    <button class="btn-dictate" id="dictate-btn" onclick="openDictation()">🎤 Smart Voice Entry</button>

    <div class="type-toggle">
        <label><input type="radio" name="transactionType" id="type-spent" value="Spent" checked><span class="type-box">💸 Spent</span></label>
        <label><input type="radio" name="transactionType" id="type-received" value="Received"><span class="type-box">💰 Received</span></label>
    </div>

    <div class="form-group"><label for="date">Date</label><input type="date" id="date" class="form-control"></div>
    <div class="form-group"><label for="memo">Memo</label><input type="text" id="memo" class="form-control" placeholder="What was this for?"></div>
    <div class="form-group"><label for="source">Source</label><select id="source" class="form-control"></select></div>
    <div class="form-group"><label for="category">Category</label><select id="category" class="form-control"></select></div>
    <div class="form-group"><label for="amount">Amount</label><input type="number" id="amount" class="form-control" placeholder="0.00" min="0" step="0.01"></div>
    
    <div class="btn-group"><button class="btn btn-save" id="save-btn" onclick="saveToSheet()">Save Entry</button></div>
</div>

<div id="emoji-overlay" class="emoji-overlay"></div>

<!-- Smart Voice Entry Modal -->
<div class="modal-overlay" id="smart-modal">
    <div class="modal">
        <div class="modal-header">
            <h3 id="smart-title">🎤 Smart Voice Entry</h3>
            <button class="close-btn" onclick="closeDictation()">×</button>
        </div>

        <!-- Capture view -->
        <div id="capture-view">
            <div style="text-align:center; margin-bottom:8px;">
                <button class="mic-circle" id="mic-btn" onclick="toggleListening()">🎤</button>
                <p class="dictation-status" id="dictation-status">Tap the mic and speak, e.g. "I spent 500 on vegetables today".</p>
            </div>
            <textarea id="transcript" class="transcript-box" placeholder="Your words appear here — you can also type or edit before analyzing..."></textarea>
            <button class="btn-dictate" id="analyze-btn" onclick="analyzeText()" style="margin-top:16px; margin-bottom:0;">✨ Analyze with AI</button>
        </div>

        <!-- Preview view -->
        <div id="preview-view" style="display:none;">
            <p class="dictation-status" style="margin-bottom:16px;">Review &amp; edit before saving:</p>
            <div class="form-group"><label>Type</label><select id="pv-type" class="form-control"><option value="Spent">💸 Spent</option><option value="Received">💰 Received</option></select></div>
            <div class="form-group"><label>Date</label><input type="date" id="pv-date" class="form-control"></div>
            <div class="form-group"><label>Memo</label><input type="text" id="pv-memo" class="form-control"></div>
            <div class="form-group"><label>Amount</label><input type="number" id="pv-amount" class="form-control" min="0" step="0.01"></div>
            <div class="form-group"><label>Source</label><select id="pv-source" class="form-control"></select></div>
            <div class="form-group"><label>Category</label><select id="pv-category" class="form-control"></select></div>
            <div class="preview-actions">
                <button class="btn-secondary" onclick="backToCapture()">← Back</button>
                <button class="btn btn-save" style="margin-top:0;" onclick="confirmSmartEntry()">✓ Save</button>
            </div>
        </div>
    </div>
</div>

<!-- Management Modal -->
<div class="modal-overlay" id="manage-modal">
    <div class="modal">
        <div class="modal-header">
            <h3>Manage Lists</h3>
            <button class="close-btn" onclick="closeModal()">×</button>
        </div>
        
        <div class="list-section">
            <h4>Categories</h4>
            <div class="add-row">
                <input type="text" id="new-cat-input" placeholder="New category...">
                <button onclick="addListCat()">Add</button>
            </div>
            <ul class="manage-list" id="modal-cat-list"></ul>
        </div>

        <div class="list-section">
            <h4>Sources</h4>
            <div class="add-row">
                <input type="text" id="new-src-input" placeholder="New source...">
                <button onclick="addListSrc()">Add</button>
            </div>
            <ul class="manage-list" id="modal-src-list"></ul>
        </div>

        <div class="list-section">
            <h4>OpenRouter API Key (for Smart Voice Entry)</h4>
            <div class="add-row">
                <input type="password" id="api-key-input" placeholder="Paste your OpenRouter API key...">
                <button onclick="saveApiKey()">Save</button>
            </div>
            <p style="font-size:0.78rem; color:var(--text-muted); margin-top:4px;">Stored only in this browser. Get a free key at openrouter.ai/keys.</p>
        </div>
    </div>
</div>

<script>
    // --- APP DATA CONFIG ---
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxKmWxJ8c3WkM9YzOaOC0jx7YcGg4XbUy8cGqQI-xcF8Fge0AO6cF8h8A-WivAVcVWNXg/exec";
    const OPENROUTER_URL = "https://openrouter.ai/api/v1/chat/completions";
    const OPENROUTER_MODELS_URL = "https://openrouter.ai/api/v1/models";
    const MAX_MODELS_TO_TRY = 6;  // how many live free models to attempt before giving up
    let freeModelCache = null;    // discovered ":free" model ids, fetched once per page load
    
    // Load lists from LocalStorage. If empty (first run), use the default injected from the wizard.
    let appCategories = JSON.parse(localStorage.getItem('appCategories')) || ["Groceries","Personal (Needs)","Personal (Luxury)","Family (Luxury)","Shumy","Family (Needs)","Donations","Loan","Bike","Car","Misc","Funds","Transfers/Withdrawals","Traveling"];
    let appSources = JSON.parse(localStorage.getItem('appSources')) || ["Cash","EasyPaisa","ABL"];

    function saveLocalLists() {
        localStorage.setItem('appCategories', JSON.stringify(appCategories));
        localStorage.setItem('appSources', JSON.stringify(appSources));
        populateDropdowns();
        renderModalLists();
    }

    function populateDropdowns() {
        const catSelect = document.getElementById('category');
        catSelect.innerHTML = '';
        appCategories.forEach(cat => catSelect.appendChild(new Option(cat, cat)));

        const srcSelect = document.getElementById('source');
        srcSelect.innerHTML = '';
        appSources.forEach(src => srcSelect.appendChild(new Option(src, src)));
    }

    // --- MODAL LOGIC ---
    function openModal() {
        renderModalLists();
        loadApiKey();
        document.getElementById('manage-modal').classList.add('active');
    }
    
    function closeModal() {
        document.getElementById('manage-modal').classList.remove('active');
    }

    function renderModalLists() {
        const cList = document.getElementById('modal-cat-list');
        cList.innerHTML = '';
        appCategories.forEach((cat, idx) => {
            cList.innerHTML += `<li><span>${cat}</span> <button onclick="delCat(${idx})" title="Delete">×</button></li>`;
        });

        const sList = document.getElementById('modal-src-list');
        sList.innerHTML = '';
        appSources.forEach((src, idx) => {
            sList.innerHTML += `<li><span>${src}</span> <button onclick="delSrc(${idx})" title="Delete">×</button></li>`;
        });
    }

    function addListCat() {
        const val = document.getElementById('new-cat-input').value.trim();
        if(val && !appCategories.includes(val)) { appCategories.push(val); document.getElementById('new-cat-input').value = ''; saveLocalLists(); }
    }
    function delCat(idx) {
        if(appCategories.length > 1) { appCategories.splice(idx, 1); saveLocalLists(); } else { alert("You must have at least one category!"); }
    }
    
    function addListSrc() {
        const val = document.getElementById('new-src-input').value.trim();
        if(val && !appSources.includes(val)) { appSources.push(val); document.getElementById('new-src-input').value = ''; saveLocalLists(); }
    }
    function delSrc(idx) {
        if(appSources.length > 1) { appSources.splice(idx, 1); saveLocalLists(); } else { alert("You must have at least one source!"); }
    }

    // --- FULLSCREEN LOGIC ---
    function toggleFullScreen() {
        if (!document.fullscreenElement && !document.mozFullScreenElement && !document.webkitFullscreenElement && !document.msFullscreenElement) {
            // Enter fullscreen
            if (document.documentElement.requestFullscreen) {
                document.documentElement.requestFullscreen();
            } else if (document.documentElement.msRequestFullscreen) {
                document.documentElement.msRequestFullscreen();
            } else if (document.documentElement.mozRequestFullScreen) {
                document.documentElement.mozRequestFullScreen();
            } else if (document.documentElement.webkitRequestFullscreen) {
                document.documentElement.webkitRequestFullscreen(Element.ALLOW_KEYBOARD_INPUT);
            }
        } else {
            // Exit fullscreen
            if (document.exitFullscreen) {
                document.exitFullscreen();
            } else if (document.msExitFullscreen) {
                document.msExitFullscreen();
            } else if (document.mozCancelFullScreen) {
                document.mozCancelFullScreen();
            } else if (document.webkitExitFullscreen) {
                document.webkitExitFullscreen();
            }
        }
    }

    // Update button text when fullscreen status changes (e.g. if user presses ESC)
    function updateFullscreenButton() {
        const fsBtn = document.getElementById('fs-btn');
        if (document.fullscreenElement || document.webkitIsFullScreen || document.mozFullScreen || document.msFullscreenElement) {
            fsBtn.innerHTML = '🗗 Exit FS';
        } else {
            fsBtn.innerHTML = '⛶ Fullscreen';
        }
    }
    
    document.addEventListener('fullscreenchange', updateFullscreenButton);
    document.addEventListener('webkitfullscreenchange', updateFullscreenButton);
    document.addEventListener('mozfullscreenchange', updateFullscreenButton);
    document.addEventListener('MSFullscreenChange', updateFullscreenButton);


    // --- MEDIA & UI LOGIC ---
    function playSound(type) {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        if (!AudioContext) return;
        const ctx = new AudioContext();
        const osc = ctx.createOscillator();
        const gainNode = ctx.createGain();
        osc.connect(gainNode);
        gainNode.connect(ctx.destination);
        if (type === 'Received') {
            osc.type = 'sine';
            osc.frequency.setValueAtTime(523.25, ctx.currentTime);
            osc.frequency.setValueAtTime(659.25, ctx.currentTime + 0.1);
            osc.frequency.setValueAtTime(783.99, ctx.currentTime + 0.2);
            osc.frequency.setValueAtTime(1046.50, ctx.currentTime + 0.3);
            gainNode.gain.setValueAtTime(0, ctx.currentTime);
            gainNode.gain.linearRampToValueAtTime(0.4, ctx.currentTime + 0.05);
            gainNode.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.6);
            osc.start(); osc.stop(ctx.currentTime + 0.6);
        } else {
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(300, ctx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(100, ctx.currentTime + 0.5);
            gainNode.gain.setValueAtTime(0, ctx.currentTime);
            gainNode.gain.linearRampToValueAtTime(0.3, ctx.currentTime + 0.05);
            gainNode.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.5);
            osc.start(); osc.stop(ctx.currentTime + 0.5);
        }
    }

    function triggerEmojiAnimation(type) {
        const overlay = document.getElementById('emoji-overlay');
        overlay.classList.remove('show');
        setTimeout(() => {
            overlay.textContent = type === 'Received' ? '🤑' : '🙄';
            overlay.classList.add('show');
        }, 10);
    }

    function toggleTheme() {
        const body = document.body;
        const btn = document.getElementById('theme-btn');
        if (body.getAttribute('data-theme') === 'dark') {
            body.removeAttribute('data-theme');
            btn.innerHTML = '🌙 Dark Mode';
            localStorage.setItem('theme', 'light');
        } else {
            body.setAttribute('data-theme', 'dark');
            btn.innerHTML = '☀️ Light Mode';
            localStorage.setItem('theme', 'dark');
        }
    }

    function initializeForm() {
        if (localStorage.getItem('theme') === 'dark') {
            document.body.setAttribute('data-theme', 'dark');
            document.getElementById('theme-btn').innerHTML = '☀️ Light Mode';
        }
        document.getElementById('date').value = new Date().toISOString().split('T')[0];
        
        // Save to cache immediately so UI matches logic
        if(!localStorage.getItem('appCategories')) saveLocalLists();
        else populateDropdowns();
    }

    // --- FORM SUBMISSION ---
    function saveToSheet() {
        const btn = document.getElementById('save-btn');
        const type = document.querySelector('input[name="transactionType"]:checked').value;
        const rawAmount = document.getElementById('amount').value;
        const amountNumber = parseFloat(rawAmount);

        if (isNaN(amountNumber) || amountNumber <= 0) { alert("Please enter a valid amount."); return; }
        const formattedAmount = amountNumber.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });

        btn.disabled = true; btn.innerHTML = '<span class="loader"></span> Saving...'; btn.style.background = '#64748b'; btn.style.boxShadow = 'none';

        const params = new URLSearchParams({
            date: document.getElementById('date').value,
            type: type,
            amount: formattedAmount,
            memo: document.getElementById('memo').value,
            category: document.getElementById('category').value,
            source: document.getElementById('source').value
        });

        const img = new Image();
        const handleSuccess = () => {
            playSound(type); triggerEmojiAnimation(type);
            btn.innerHTML = '✅ Saved!'; btn.style.background = '#10b981';
            document.getElementById('amount').value = ''; document.getElementById('memo').value = '';
            document.getElementById('type-spent').checked = true;
            setTimeout(() => { btn.innerHTML = 'Save Entry'; btn.style.background = 'linear-gradient(135deg, #10b981, #059669)'; btn.style.boxShadow = '0 4px 15px rgba(16, 185, 129, 0.4)'; btn.disabled = false; }, 2000);
        };
        img.onload = handleSuccess; img.onerror = handleSuccess; 
        img.src = `${WEB_APP_URL}?${params.toString()}`; 
    }
    
    // --- OPENROUTER API KEY ---
    function loadApiKey() {
        const k = localStorage.getItem('openRouterApiKey');
        document.getElementById('api-key-input').value = k || '';
    }
    function saveApiKey() {
        const k = document.getElementById('api-key-input').value.trim();
        localStorage.setItem('openRouterApiKey', k);
        alert(k ? "OpenRouter API key saved!" : "OpenRouter API key cleared.");
    }

    // --- SMART VOICE ENTRY ---
    let recognition = null;
    let isListening = false;

    function openDictation() {
        document.getElementById('capture-view').style.display = 'block';
        document.getElementById('preview-view').style.display = 'none';
        document.getElementById('smart-title').textContent = '🎤 Smart Voice Entry';
        document.getElementById('transcript').value = '';
        document.getElementById('dictation-status').textContent = localStorage.getItem('openRouterApiKey')
            ? 'Tap the mic and speak, e.g. "I spent 500 on vegetables today".'
            : '⚠️ Add your OpenRouter API key in Settings (⚙️) first.';
        document.getElementById('smart-modal').classList.add('active');
    }

    function closeDictation() {
        if (recognition && isListening) { try { recognition.stop(); } catch(e){} }
        document.getElementById('smart-modal').classList.remove('active');
    }

    function toggleListening() {
        if (isListening) { try { recognition.stop(); } catch(e){} return; }
        const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SR) {
            document.getElementById('dictation-status').textContent = 'Voice input is not supported in this browser — please type your entry below instead.';
            return;
        }
        recognition = new SR();
        recognition.lang = 'en-US';
        recognition.interimResults = true;
        recognition.continuous = false;

        let finalText = document.getElementById('transcript').value;
        finalText = finalText ? finalText + ' ' : '';

        recognition.onresult = (event) => {
            let interim = '';
            for (let i = event.resultIndex; i < event.results.length; i++) {
                const t = event.results[i][0].transcript;
                if (event.results[i].isFinal) finalText += t + ' ';
                else interim += t;
            }
            document.getElementById('transcript').value = (finalText + interim).trim();
        };
        recognition.onerror = (e) => {
            document.getElementById('dictation-status').textContent = 'Mic error: ' + e.error + '. You can type your entry instead.';
        };
        recognition.onend = () => {
            isListening = false;
            const mic = document.getElementById('mic-btn');
            mic.classList.remove('listening');
            mic.textContent = '🎤';
            const status = document.getElementById('dictation-status');
            if (status.textContent.startsWith('Listening')) status.textContent = 'Got it — tap the mic again to add more, or hit Analyze.';
        };

        recognition.start();
        isListening = true;
        const mic = document.getElementById('mic-btn');
        mic.classList.add('listening');
        mic.textContent = '⏹';
        document.getElementById('dictation-status').textContent = 'Listening... tap to stop.';
    }

    async function analyzeText() {
        const text = document.getElementById('transcript').value.trim();
        const status = document.getElementById('dictation-status');
        if (!text) { status.textContent = 'Please speak or type something first.'; return; }

        const apiKey = localStorage.getItem('openRouterApiKey');
        if (!apiKey) { status.textContent = '⚠️ Add your OpenRouter API key in Settings (⚙️) first.'; return; }

        const btn = document.getElementById('analyze-btn');
        btn.disabled = true; btn.innerHTML = '<span class="loader"></span> Analyzing...';
        status.textContent = 'Asking AI to parse your entry...';

        try {
            const result = await analyzeWithAI(text, apiKey);
            showPreview(result);
        } catch (err) {
            status.textContent = '❌ ' + (err.message || 'Failed to analyze. Check your API key and connection.');
        } finally {
            btn.disabled = false; btn.innerHTML = '✨ Analyze with AI';
        }
    }

    // Ask OpenRouter which $0 (":free") models are actually live right now, so we never
    // depend on a hard-coded slug that may have been retired.
    async function getFreeModels(apiKey) {
        if (freeModelCache && freeModelCache.length) return freeModelCache;
        const resp = await fetch(OPENROUTER_MODELS_URL, { headers: { 'Authorization': 'Bearer ' + apiKey } });
        const data = await resp.json();
        if (!resp.ok) throw new Error((data.error && data.error.message) || ('Could not load model list (HTTP ' + resp.status + ')'));
        const all = (data && data.data) || [];
        const isFree = m => m.pricing && Number(m.pricing.prompt) === 0 && Number(m.pricing.completion) === 0;
        const ids = all.filter(isFree).map(m => m.id);
        // Prefer strong, general-purpose chat models first.
        const score = id => {
            let s = 0;
            if (/llama-4|llama-3\.3|deepseek-chat|deepseek-v3|qwen.*(72b|2\.5)|mistral|gemma-3/i.test(id)) s += 3;
            if (/instruct|chat/i.test(id)) s += 1;
            return -s;
        };
        ids.sort((a, b) => score(a) - score(b));
        freeModelCache = ids;
        return ids;
    }

    async function analyzeWithAI(text, apiKey) {
        const today = new Date();
        const todayStr = today.toISOString().split('T')[0];
        const weekday = today.toLocaleDateString('en-US', { weekday: 'long' });

        const prompt =
`You are a transaction parsing assistant for a personal expense tracker.
Today's date is ${todayStr} (${weekday}).
Convert relative dates to an absolute YYYY-MM-DD date: "today" = ${todayStr}, "yesterday" = one day before, "tomorrow" = one day after. If no date is mentioned, use today.

Available categories: ${appCategories.join(', ')}.
Available sources (the account money comes from or goes to): ${appSources.join(', ')}.

Rules:
- "type" is "Spent" unless the text clearly indicates money received/earned/got/salary/refund, in which case it is "Received".
- "amount" is a positive number only, with no currency symbols or commas.
- "memo" is a short, clean description of what the transaction was for.
- "category" MUST be exactly one of the available categories listed above (pick the closest match).
- "source" MUST be exactly one of the available sources listed above (pick the closest match). If none is mentioned, pick the most likely default (e.g. Cash).

Respond with ONLY a raw JSON object, no markdown and no extra text, in exactly this shape:
{"type":"Spent","date":"YYYY-MM-DD","memo":"...","amount":0,"category":"...","source":"..."}

Parse this entry: "${text}"`;

        const models = await getFreeModels(apiKey);
        if (!models.length) throw new Error('No free models are currently available on your OpenRouter account.');

        const errors = [];
        for (const model of models.slice(0, MAX_MODELS_TO_TRY)) {
            const shortName = model.split('/').pop();
            try {
                const body = {
                    model: model,
                    messages: [{ role: "user", content: prompt }],
                    temperature: 0.2
                };
                const resp = await fetch(OPENROUTER_URL, {
                    method: 'POST',
                    headers: {
                        'Authorization': 'Bearer ' + apiKey,
                        'Content-Type': 'application/json',
                        'X-Title': 'Transaction Recorder'
                    },
                    body: JSON.stringify(body)
                });
                const data = await resp.json();
                if (!resp.ok) {
                    errors.push(shortName + ': ' + ((data.error && data.error.message) || ('HTTP ' + resp.status)));
                    continue; // try the next model
                }
                let content = data && data.choices && data.choices[0] && data.choices[0].message && data.choices[0].message.content;
                if (!content) { errors.push(shortName + ': empty response'); continue; }

                // Defensively pull the JSON object out (strip code fences / stray text)
                content = content.trim().replace(/^```(?:json)?/i, '').replace(/```$/, '').trim();
                const start = content.indexOf('{');
                const end = content.lastIndexOf('}');
                if (start !== -1 && end !== -1) content = content.slice(start, end + 1);
                return JSON.parse(content);
            } catch (e) {
                errors.push(shortName + ': ' + (e.message || String(e)));
            }
        }
        throw new Error('Tried ' + Math.min(models.length, MAX_MODELS_TO_TRY) + ' free models, all failed — ' + errors.slice(0, 3).join('  |  '));
    }

    function populatePreviewDropdowns() {
        const c = document.getElementById('pv-category'); c.innerHTML = '';
        appCategories.forEach(x => c.appendChild(new Option(x, x)));
        const s = document.getElementById('pv-source'); s.innerHTML = '';
        appSources.forEach(x => s.appendChild(new Option(x, x)));
    }

    function setSelectValue(id, value, list) {
        const sel = document.getElementById(id);
        if (value && !list.includes(value)) sel.appendChild(new Option(value, value));
        if (value) sel.value = value;
    }

    function showPreview(r) {
        populatePreviewDropdowns();
        document.getElementById('pv-type').value = (r.type === 'Received') ? 'Received' : 'Spent';
        document.getElementById('pv-date').value = r.date || new Date().toISOString().split('T')[0];
        document.getElementById('pv-memo').value = r.memo || '';
        document.getElementById('pv-amount').value = (r.amount != null) ? r.amount : '';
        setSelectValue('pv-category', r.category, appCategories);
        setSelectValue('pv-source', r.source, appSources);

        document.getElementById('capture-view').style.display = 'none';
        document.getElementById('preview-view').style.display = 'block';
        document.getElementById('smart-title').textContent = '✅ Preview Transaction';
    }

    function backToCapture() {
        document.getElementById('preview-view').style.display = 'none';
        document.getElementById('capture-view').style.display = 'block';
        document.getElementById('smart-title').textContent = '🎤 Smart Voice Entry';
    }

    function confirmSmartEntry() {
        const type = document.getElementById('pv-type').value;
        document.getElementById(type === 'Received' ? 'type-received' : 'type-spent').checked = true;
        document.getElementById('date').value = document.getElementById('pv-date').value;
        document.getElementById('memo').value = document.getElementById('pv-memo').value;
        document.getElementById('amount').value = document.getElementById('pv-amount').value;
        setSelectValue('category', document.getElementById('pv-category').value, appCategories);
        setSelectValue('source', document.getElementById('pv-source').value, appSources);

        backToCapture();
        closeDictation();
        saveToSheet();
    }

    window.onload = initializeForm;
</script>
